<svg width="580" height="820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="580" height="820" fill="#F2FAFF" rx="8"/>
  <text x="290" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E3A5F">Full Context: Detailed View</text>
  <text x="290" y="48" text-anchor="middle" font-size="11" fill="#6A8EB0">All middleware — optional blocks shown with dashed border</text>

  <!-- ═══ OUTER BOX ═══ -->
  <rect x="30" y="58" width="520" height="700" rx="8" fill="white" stroke="#1E3A5F" stroke-width="2"/>

  <!-- ═══ SYSTEM MESSAGE SUB-BOX ═══ -->
  <rect x="48" y="72" width="484" height="346" rx="6" fill="#EEF8FC" stroke="#2A8FA0" stroke-width="1.5"/>
  <text x="200" y="88" font-size="12" font-weight="600" fill="#1A5A6A">System Message</text>
  <rect x="362" y="78" width="62" height="16" rx="8" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="393" y="90" text-anchor="middle" font-size="9" fill="#1A6A7A">all cached</text>

  <!-- USER block -->
  <rect x="62" y="98" width="456" height="28" rx="3" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="158" y="116" text-anchor="middle" font-size="10" font-weight="600" fill="#1A5A6A">USER</text>
  <text x="350" y="116" text-anchor="middle" font-size="9" fill="#2A7A8A">system_prompt= argument</text>

  <!-- BASE block -->
  <rect x="62" y="130" width="456" height="28" rx="3" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="158" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#1A5A6A">BASE</text>
  <text x="350" y="148" text-anchor="middle" font-size="9" fill="#2A7A8A">BASE_AGENT_PROMPT</text>

  <!-- SUFFIX block -->
  <rect x="62" y="162" width="456" height="28" rx="3" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="158" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#1A5A6A">SUFFIX</text>
  <text x="350" y="180" text-anchor="middle" font-size="9" fill="#2A7A8A">model-specific prompt steering</text>

  <!-- Middleware divider -->
  <line x1="62" y1="200" x2="518" y2="200" stroke="#9AB0C8" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="290" y="210" text-anchor="middle" font-size="8" fill="#9AB0C8">Middleware Usage Instructions</text>

  <!-- TodoListMiddleware (required) -->
  <rect x="62" y="216" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1"/>
  <text x="290" y="232" text-anchor="middle" font-size="10" fill="#1A5A6A">TodoListMiddleware</text>

  <!-- SkillsMiddleware (optional) -->
  <rect x="62" y="244" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="270" y="260" text-anchor="middle" font-size="10" fill="#1A5A6A">SkillsMiddleware</text>
  <text x="492" y="260" text-anchor="middle" font-size="8" fill="#6A9AB0">optional</text>

  <!-- FilesystemMiddleware (required) -->
  <rect x="62" y="272" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1"/>
  <text x="290" y="288" text-anchor="middle" font-size="10" fill="#1A5A6A">FilesystemMiddleware</text>

  <!-- SubAgentMiddleware (required, cache badge) -->
  <rect x="62" y="300" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1.5"/>
  <text x="270" y="316" text-anchor="middle" font-size="10" fill="#1A5A6A">SubAgentMiddleware</text>
  <rect x="480" y="304" width="30" height="14" rx="3" fill="#2A8FA0"/>
  <text x="495" y="315" text-anchor="middle" font-size="7" fill="white">cache</text>

  <!-- AsyncSubAgentMiddleware (optional) -->
  <rect x="62" y="328" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="270" y="344" text-anchor="middle" font-size="10" fill="#1A5A6A">AsyncSubAgentMiddleware</text>
  <text x="492" y="344" text-anchor="middle" font-size="8" fill="#6A9AB0">optional</text>

  <!-- MemoryMiddleware (optional) -->
  <rect x="62" y="356" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="270" y="372" text-anchor="middle" font-size="10" fill="#1A5A6A">MemoryMiddleware</text>
  <text x="492" y="372" text-anchor="middle" font-size="8" fill="#6A9AB0">optional</text>

  <!-- SummarizationToolMiddleware (optional) -->
  <rect x="62" y="384" width="456" height="24" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="270" y="400" text-anchor="middle" font-size="10" fill="#1A5A6A">SummarizationToolMiddleware</text>
  <text x="492" y="400" text-anchor="middle" font-size="8" fill="#6A9AB0">optional</text>

  <!-- ═══ TOOL SCHEMAS SECTION ═══ -->
  <text x="100" y="440" font-size="12" font-weight="600" fill="#1E3A5F">Tool Schemas</text>
  <text x="468" y="440" text-anchor="middle" font-size="9" fill="#9AB0C8">one per registered tool</text>

  <rect x="62" y="448" width="456" height="24" rx="3" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="290" y="464" text-anchor="middle" font-size="10" fill="#1A4A2A">read_file</text>

  <rect x="62" y="476" width="456" height="24" rx="3" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="290" y="492" text-anchor="middle" font-size="10" fill="#1A4A2A">search_web</text>

  <rect x="62" y="504" width="456" height="24" rx="3" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="290" y="520" text-anchor="middle" font-size="10" fill="#1A4A2A">task</text>

  <text x="290" y="542" text-anchor="middle" font-size="14" fill="#9AB0C8">&#xb7; &#xb7; &#xb7;</text>

  <!-- ═══ MESSAGES SECTION ═══ -->
  <text x="100" y="560" font-size="12" font-weight="600" fill="#1E3A5F">Messages</text>
  <text x="468" y="560" text-anchor="middle" font-size="9" fill="#9AB0C8">oldest at top</text>

  <!-- ∑ Summary (oldest) -->
  <rect x="62" y="568" width="456" height="40" rx="4" fill="#D4F2E0" stroke="#2A9A5A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="290" y="586" text-anchor="middle" font-size="11" font-weight="700" fill="#1A6A3A">&#x2211; Summary</text>
  <text x="290" y="601" text-anchor="middle" font-size="9" fill="#2A7A4A">session intent &#xb7; key facts &#xb7; next steps</text>

  <!-- m6 HumanMessage -->
  <rect x="62" y="614" width="456" height="24" rx="3" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="290" y="630" text-anchor="middle" font-size="10" fill="#1A3A7A">Human: Save that to a file.</text>

  <text x="290" y="652" text-anchor="middle" font-size="14" fill="#9AB0C8">&#xb7; &#xb7; &#xb7;</text>

  <!-- m16 AIMessage with tool call -->
  <rect x="62" y="661" width="456" height="24" rx="3" fill="#E8DAFF" stroke="#7A4AD4" stroke-width="1"/>
  <text x="272" y="677" text-anchor="middle" font-size="10" fill="#3A1A7A">AI: [calls search_web]</text>
  <rect x="478" y="665" width="32" height="14" rx="3" fill="#7A4AD4"/>
  <text x="494" y="676" text-anchor="middle" font-size="7" fill="white">tool&#x2197;</text>

  <!-- m17 ToolMessage -->
  <rect x="62" y="689" width="456" height="24" rx="3" fill="#FFE8D6" stroke="#D4834A" stroke-width="1"/>
  <text x="290" y="705" text-anchor="middle" font-size="10" fill="#7A3A10">Tool: search result</text>

  <!-- m19 HumanMessage (newest) -->
  <rect x="62" y="717" width="456" height="24" rx="3" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="290" y="733" text-anchor="middle" font-size="10" fill="#1A3A7A">Human: What else can it do?</text>

  <!-- Legend (outside box) -->
  <rect x="30" y="774" width="12" height="12" rx="2" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="47" y="785" font-size="9" fill="#5A7A9F">System (cached)</text>
  <rect x="140" y="774" width="12" height="12" rx="2" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1"/>
  <text x="157" y="785" font-size="9" fill="#5A7A9F">Middleware</text>
  <rect x="228" y="774" width="12" height="12" rx="2" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="245" y="785" font-size="9" fill="#5A7A9F">Optional</text>
  <rect x="300" y="774" width="12" height="12" rx="2" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="317" y="785" font-size="9" fill="#5A7A9F">Tool Schema</text>
  <rect x="395" y="774" width="12" height="12" rx="2" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="412" y="785" font-size="9" fill="#5A7A9F">Human</text>
  <rect x="456" y="774" width="12" height="12" rx="2" fill="#E8DAFF" stroke="#7A4AD4" stroke-width="1"/>
  <text x="473" y="785" font-size="9" fill="#5A7A9F">AI</text>
  <rect x="490" y="774" width="12" height="12" rx="2" fill="#FFE8D6" stroke="#D4834A" stroke-width="1"/>
  <text x="507" y="785" font-size="9" fill="#5A7A9F">Tool</text>
</svg>
