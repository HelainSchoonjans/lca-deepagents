<svg width="580" height="730" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="580" height="730" fill="#F2FAFF" rx="8"/>
  <text x="290" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E3A5F">Full Context: What the Model Sees</text>
  <text x="290" y="48" text-anchor="middle" font-size="11" fill="#6A8EB0">Snapshot mid-conversation — oldest at top, newest at bottom</text>

  <!-- ═══ OUTER BOX ═══ -->
  <rect x="30" y="58" width="520" height="622" rx="8" fill="white" stroke="#1E3A5F" stroke-width="2"/>

  <!-- ═══ SYSTEM MESSAGE SUB-BOX ═══ -->
  <rect x="48" y="72" width="484" height="186" rx="6" fill="#EEF8FC" stroke="#2A8FA0" stroke-width="1.5"/>
  <text x="200" y="88" font-size="12" font-weight="600" fill="#1A5A6A">System Message</text>
  <rect x="362" y="78" width="62" height="16" rx="8" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="393" y="90" text-anchor="middle" font-size="9" fill="#1A6A7A">all cached</text>

  <!-- USER block -->
  <rect x="62" y="98" width="456" height="30" rx="3" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="158" y="117" text-anchor="middle" font-size="10" font-weight="600" fill="#1A5A6A">USER</text>
  <text x="350" y="117" text-anchor="middle" font-size="9" fill="#2A7A8A">system_prompt= argument</text>

  <!-- BASE block -->
  <rect x="62" y="133" width="456" height="30" rx="3" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="158" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1A5A6A">BASE</text>
  <text x="350" y="152" text-anchor="middle" font-size="9" fill="#2A7A8A">BASE_AGENT_PROMPT</text>

  <!-- SUFFIX block -->
  <rect x="62" y="168" width="456" height="30" rx="3" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="158" y="187" text-anchor="middle" font-size="10" font-weight="600" fill="#1A5A6A">SUFFIX</text>
  <text x="350" y="187" text-anchor="middle" font-size="9" fill="#2A7A8A">model-specific prompt steering</text>

  <!-- Middleware Usage Instructions block -->
  <line x1="62" y1="207" x2="518" y2="207" stroke="#9AB0C8" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="62" y="213" width="456" height="36" rx="3" fill="#D8F0F8" stroke="#2A8FA0" stroke-width="1"/>
  <text x="290" y="235" text-anchor="middle" font-size="10" fill="#1A5A6A">Middleware Usage Instructions</text>

  <!-- ═══ TOOL SCHEMAS SECTION ═══ -->
  <text x="100" y="275" font-size="12" font-weight="600" fill="#1E3A5F">Tool Schemas</text>
  <text x="468" y="275" text-anchor="middle" font-size="9" fill="#9AB0C8">one per registered tool</text>

  <rect x="62" y="283" width="456" height="26" rx="3" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="290" y="300" text-anchor="middle" font-size="10" fill="#1A4A2A">read_file</text>

  <rect x="62" y="313" width="456" height="26" rx="3" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="290" y="330" text-anchor="middle" font-size="10" fill="#1A4A2A">search_web</text>

  <rect x="62" y="343" width="456" height="26" rx="3" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="290" y="360" text-anchor="middle" font-size="10" fill="#1A4A2A">task</text>

  <text x="290" y="383" text-anchor="middle" font-size="14" fill="#9AB0C8">&#xb7; &#xb7; &#xb7;</text>

  <!-- ═══ MESSAGES SECTION ═══ -->
  <text x="100" y="400" font-size="12" font-weight="600" fill="#1E3A5F">Messages</text>
  <text x="468" y="400" text-anchor="middle" font-size="9" fill="#9AB0C8">oldest at top</text>

  <!-- ∑ Summary (oldest) -->
  <rect x="62" y="408" width="456" height="52" rx="4" fill="#D4F2E0" stroke="#2A9A5A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="290" y="429" text-anchor="middle" font-size="12" font-weight="700" fill="#1A6A3A">&#x2211; Summary</text>
  <line x1="80" y1="436" x2="500" y2="436" stroke="#3AB860" stroke-width="0.8"/>
  <text x="290" y="451" text-anchor="middle" font-size="9" fill="#2A7A4A">session intent &#xb7; key facts &#xb7; next steps</text>

  <!-- m6 HumanMessage -->
  <rect x="62" y="466" width="456" height="26" rx="3" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="290" y="483" text-anchor="middle" font-size="10" fill="#1A3A7A">Human: Save that to a file.</text>

  <text x="290" y="505" text-anchor="middle" font-size="14" fill="#9AB0C8">&#xb7; &#xb7; &#xb7;</text>

  <!-- m15 HumanMessage -->
  <rect x="62" y="515" width="456" height="26" rx="3" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="290" y="532" text-anchor="middle" font-size="10" fill="#1A3A7A">Human: Find Python docs.</text>

  <!-- m16 AIMessage with tool call -->
  <rect x="62" y="545" width="456" height="26" rx="3" fill="#E8DAFF" stroke="#7A4AD4" stroke-width="1"/>
  <text x="272" y="562" text-anchor="middle" font-size="10" fill="#3A1A7A">AI: [calls search_web]</text>
  <rect x="478" y="549" width="32" height="14" rx="3" fill="#7A4AD4"/>
  <text x="494" y="560" text-anchor="middle" font-size="7" fill="white">tool&#x2197;</text>

  <!-- m17 ToolMessage -->
  <rect x="62" y="575" width="456" height="26" rx="3" fill="#FFE8D6" stroke="#D4834A" stroke-width="1"/>
  <text x="290" y="592" text-anchor="middle" font-size="10" fill="#7A3A10">Tool: search result</text>

  <!-- m18 AIMessage -->
  <rect x="62" y="605" width="456" height="26" rx="3" fill="#E8DAFF" stroke="#7A4AD4" stroke-width="1"/>
  <text x="290" y="622" text-anchor="middle" font-size="10" fill="#3A1A7A">AI: Here is what I found.</text>

  <!-- m19 HumanMessage (newest) -->
  <rect x="62" y="635" width="456" height="26" rx="3" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="290" y="652" text-anchor="middle" font-size="10" fill="#1A3A7A">Human: What else can it do?</text>

  <!-- Legend -->
  <rect x="30" y="692" width="12" height="12" rx="2" fill="#C8EEF5" stroke="#2A8FA0" stroke-width="1"/>
  <text x="47" y="703" font-size="10" fill="#5A7A9F">System (cached)</text>
  <rect x="148" y="692" width="12" height="12" rx="2" fill="#EAF5EA" stroke="#4A8A5A" stroke-width="1"/>
  <text x="165" y="703" font-size="10" fill="#5A7A9F">Tool Schema</text>
  <rect x="258" y="692" width="12" height="12" rx="2" fill="#CCE5FF" stroke="#3A74D4" stroke-width="1"/>
  <text x="275" y="703" font-size="10" fill="#5A7A9F">HumanMessage</text>
  <rect x="368" y="692" width="12" height="12" rx="2" fill="#E8DAFF" stroke="#7A4AD4" stroke-width="1"/>
  <text x="385" y="703" font-size="10" fill="#5A7A9F">AIMessage</text>
  <rect x="458" y="692" width="12" height="12" rx="2" fill="#FFE8D6" stroke="#D4834A" stroke-width="1"/>
  <text x="475" y="703" font-size="10" fill="#5A7A9F">ToolMessage</text>
</svg>
