<svg width="500" height="360" xmlns="http://www.w3.org/2000/svg" font-family="'Menlo', 'Monaco', 'Courier New', monospace">
  <rect width="500" height="360" fill="#1E1E2E" rx="10"/>

  <!-- Title bar -->
  <rect width="500" height="36" fill="#2A2A3E" rx="10"/>
  <rect width="500" height="10" y="26" fill="#2A2A3E"/>
  <circle cx="18" cy="18" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="18" r="6" fill="#FEBC2E"/>
  <circle cx="58" cy="18" r="6" fill="#28C840"/>
  <text x="250" y="23" text-anchor="middle" font-size="12" fill="#8888AA">LLM API Call</text>

  <!-- Opening brace -->
  <text x="24" y="66" font-size="13" fill="#CDD6F4">{</text>

  <!-- system field -->
  <text x="44" y="90" font-size="13" fill="#89B4FA">"system"</text>
  <text x="122" y="90" font-size="13" fill="#CDD6F4">: [</text>
  <text x="148" y="90" font-size="13" fill="#6C7086">  ← content blocks (USER + BASE + SUFFIX + middleware)</text>

  <text x="64" y="112" font-size="12" fill="#A6E3A1">{ "type": "text", "text": "You are..." },</text>
  <text x="64" y="130" font-size="12" fill="#A6E3A1">{ "type": "text", "text": "Todo list..." },</text>
  <text x="64" y="148" font-size="12" fill="#6C7086">...</text>
  <text x="44" y="166" font-size="13" fill="#CDD6F4">],</text>

  <!-- divider -->
  <line x1="24" y1="180" x2="476" y2="180" stroke="#3A3A5E" stroke-width="1"/>

  <!-- tools field -->
  <text x="44" y="200" font-size="13" fill="#89B4FA">"tools"</text>
  <text x="110" y="200" font-size="13" fill="#CDD6F4">: [</text>
  <text x="136" y="200" font-size="13" fill="#6C7086">  ← one schema per registered tool</text>

  <text x="64" y="222" font-size="12" fill="#FAB387">{ "name": "read_file", "description": "..." },</text>
  <text x="64" y="240" font-size="12" fill="#FAB387">{ "name": "search_web", "description": "..." },</text>
  <text x="64" y="258" font-size="12" fill="#6C7086">...</text>
  <text x="44" y="276" font-size="13" fill="#CDD6F4">],</text>

  <!-- divider -->
  <line x1="24" y1="288" x2="476" y2="288" stroke="#3A3A5E" stroke-width="1"/>

  <!-- messages field -->
  <text x="44" y="308" font-size="13" fill="#89B4FA">"messages"</text>
  <text x="142" y="308" font-size="13" fill="#CDD6F4">: [</text>
  <text x="168" y="308" font-size="13" fill="#6C7086">  ← effective message list (oldest → newest)</text>

  <text x="44" y="330" font-size="13" fill="#CDD6F4">]</text>

  <!-- Closing brace -->
  <text x="24" y="350" font-size="13" fill="#CDD6F4">}</text>
</svg>
